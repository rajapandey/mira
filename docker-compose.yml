version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mira-postgres
    restart: always
    environment:
      POSTGRES_DB: mira_db
      POSTGRES_USER: mira_user
      POSTGRES_PASSWORD: mira_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
